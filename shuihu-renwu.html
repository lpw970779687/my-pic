    <script>
        function loadCharacters() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';

            let totalImages = 0;

            shuihuConfig.characters.forEach(character => {
                totalImages += character.images.length;

                const galleryItem = document.createElement('div');
                galleryItem.className = 'gallery-item';
                galleryItem.onclick = function() {
                    window.location.href = 'character.html?book=shuihu&name=' + encodeURIComponent(character.name);
                };

                const coverImage = character.imagePath + character.cover;

                galleryItem.innerHTML = '<img src="' + coverImage + '" alt="' + character.name + '"><div class="gallery-item-info"><h3>' + character.name + '</h3><p>' + character.title + '</p><p class="image-count">共 ' + character.images.length + ' 张图片</p></div>';

                gallery.appendChild(galleryItem);
            });

            document.getElementById('totalCharacters').textContent = '👥 人物：' + shuihuConfig.characters.length + '个';
            document.getElementById('totalImages').textContent = '🎨 图片：' + totalImages + '张';
        }

        loadCharacters();
    </script>
