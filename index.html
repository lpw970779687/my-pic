<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="水浒传一百零八将静态图片展示页">

    <title>水浒传 · 一百零八好汉图鉴</title>

    <link rel="stylesheet" href="css/style.css" type="text/css">
    <link rel="icon" href="image/placeholder.svg">
    <script src="js/main.js" defer></script>
</head>

<body>
    <header>
        <div class="site-title">
            <div class="site-title__main">水浒传 · 一百零八好汉图鉴</div>
            <div class="site-title__sub">静态展示 · 搜索/筛选 · 点击卡片查看大图</div>
        </div>

        <div class="toolbar">
            <div class="toolbar__filters" role="tablist" aria-label="筛选">
                <button class="filter-btn" data-filter="all">全部 108</button>
                <button class="filter-btn" data-filter="tiangang">天罡 36</button>
                <button class="filter-btn" data-filter="disha">地煞 72</button>
            </div>

            <div class="toolbar__search">
                <input id="search" type="search" placeholder="搜索：姓名 / 绰号（例如：宋江、及时雨）" autocomplete="off" />
                <button id="clear-search" type="button" class="ghost-btn">清空</button>
            </div>
        </div>
    </header>
    
    <main>
        <div id="gallery" class="image-gallery">
            <p class="hint">加载中...</p>
        </div>
    </main>
    
    <footer>
        <div class="footer-inner">
            <div class="footer-note">
                图片路径约定：把图片放到 <code>image/108/</code>，命名为 <code>001-宋江.jpg</code> 这种格式（001~108）。
            </div>
            <div class="footer-copy">© 2026 水浒传 · 108好汉静态展示页</div>
        </div>
    </footer>
</body>
</html>
