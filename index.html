<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="SD罗七素材网 - 高质量AI角色设计素材">
    <meta name="author" content="帕维斯_罗">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="cache-control" content="no-store, no-cache, must-revalidate">

    <title>SD罗七素材网</title>
    <link rel="stylesheet" href="css/style.css" type="text/css">
    <link rel="icon" href="image/icon.png">
    <script src="js/main.js" defer></script>
</head>

<body>
    <!-- 顶部导航栏 -->
    <nav class="top-navbar">
        <div class="nav-container">
            <!-- Logo区域 -->
            <div class="nav-logo">
                <a href="/">
                    <span class="logo-text">SD罗七素材网</span>
                </a>
            </div>
            
            <!-- 搜索框 -->
            <div class="nav-search">
                <input type="text" id="search-input" placeholder="搜索素材...">
                <button id="search-btn" class="search-btn">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <path fill="currentColor" d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- 分类筛选栏 -->
    <div class="filter-section">
        <div class="filter-container">
            <div class="filter-row">
                <span class="filter-label">分类：</span>
                <div class="filter-options" id="category-filter">
                    <button class="filter-btn active" data-category="all">全部</button>
                    <button class="filter-btn" data-category="都市人物(男)">都市人物(男)</button>
                    <button class="filter-btn" data-category="都市人物(女)">都市人物(女)</button>
                    <button class="filter-btn" data-category="修仙人物(男)">修仙人物(男)</button>
                    <button class="filter-btn" data-category="修仙人物(女)">修仙人物(女)</button>
                    <button class="filter-btn" data-category="动物">动物</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 主要内容区域 -->
    <main class="main-content">
        <!-- 素材统计信息 -->
        <div class="content-header">
            <h2 class="section-title">素材列表</h2>
            <span class="content-count">共 <span id="total-count">0</span> 个素材</span>
        </div>
        
        <!-- 素材卡片网格 -->
        <div id="gallery" class="material-grid">
            <!-- 素材卡片将通过JavaScript动态生成 -->
        </div>
        
        <!-- 分页控件 -->
        <div id="pagination" class="pagination-container"></div>
    </main>

    <!-- 底部区域 -->
    <footer class="main-footer">
        <div class="footer-container">
            <!-- 打赏支持 -->
            <div class="footer-section">
                <h4>💝 打赏支持</h4>
                <p class="donation-text">如果我们的素材对您有帮助，欢迎打赏支持我们持续创作！</p>
                <div class="payment-methods">
                    <div class="payment-item">
                        <img src="image/微信.jpg" alt="微信支付">
                        <span>微信打赏</span>
                    </div>
                    <div class="payment-item">
                        <img src="image/支付宝.jpg" alt="支付宝">
                        <span>支付宝打赏</span>
                    </div>
                </div>
            </div>
            
            <!-- 推荐资源 -->
            <div class="footer-section">
                <h4>推荐资源</h4>
                <a href="https://www.axutongxue.com/" target="_blank" class="resource-link">
                    阿虚同学的储物间 - 互联网资源导航
                </a>
            </div>
        </div>
        
        <!-- 版权信息 -->
        <div class="footer-bottom">
            <p>© 2025 SD罗七素材网 - 版权所有</p>
            <p>
                <a href="https://beian.miit.gov.cn" target="_blank">陕ICP备2025083047号-1</a>
            </p>
        </div>
    </footer>

    <!-- 素材详情弹窗 -->
    <div id="material-modal" class="material-modal">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            
            <div class="modal-body">
                <!-- 左侧：图片展示 -->
                <div class="modal-gallery">
                    <div class="main-image-container">
                        <img id="modal-main-image" src="" alt="">
                        <div class="image-tags">
                            <span class="tag tag-free" id="modal-tag-free">免费</span>
                            <span class="tag tag-exclusive" id="modal-tag-exclusive">独家</span>
                            <span class="tag tag-copyright" id="modal-tag-copyright">版权</span>
                        </div>
                    </div>
                    <div class="thumbnail-list" id="modal-thumbnails"></div>
                </div>
                
                <!-- 右侧：素材信息 -->
                <div class="modal-info">
                    <h2 id="modal-title" class="modal-title">素材标题</h2>
                    
                    <div class="modal-meta">
                        <span class="meta-item">
                            <span class="meta-label">分类：</span>
                            <span id="modal-category">--</span>
                        </span>
                        <span class="meta-item">
                            <span class="meta-label">上传时间：</span>
                            <span id="modal-date">--</span>
                        </span>
                    </div>
                    
                    <div class="modal-description">
                        <h3>素材介绍</h3>
                        <p id="modal-description">暂无描述</p>
                    </div>
                    
                    <div class="modal-actions">
                        <button class="action-btn btn-download" id="btn-download">立即下载</button>
                    </div>
                    
                    <div class="modal-notice">
                        <p>✅ 本素材完全免费，下载即同意《用户服务协议》</p>
                    </div>
                </div>
            </div>
        </div>
    </div>


</body>
</html>
