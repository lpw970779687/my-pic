<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水浒传-物品 - 古典名著图片展示</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">📚 古典名著图片展示</div>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="shuihu.html">水浒传</a>
                <a href="shuihu-wupin.html" class="active">物品</a>
                <a href="xiyou.html">西游记</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <header class="category-header">
            <h1>水浒传 - 物品</h1>
            <p class="category-intro">水浒传中的兵器、宝物等物品</p>
            <div class="category-meta">
                <span>⚔️ 物品：6个</span>
                <span>🎨 图片：6张</span>
            </div>
        </header>

        <div class="gallery">
            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="https://picsum.photos/600/400?random=50" alt="青龙偃月刀">
                <div class="gallery-item-info">
                    <h3>青龙偃月刀</h3>
                    <p>关云长的兵器，重八十二斤</p>
                </div>
            </div>

            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="https://picsum.photos/600/400?random=51" alt="丈八蛇矛">
                <div class="gallery-item-info">
                    <h3>丈八蛇矛</h3>
                    <p>林冲的兵器，锋利无比</p>
                </div>
            </div>

            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="https://picsum.photos/600/400?random=52" alt="双戒刀">
                <div class="gallery-item-info">
                    <h3>双戒刀</h3>
                    <p>武松的兵器，锋利异常</p>
                </div>
            </div>

            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="https://picsum.photos/600/400?random=53" alt="水磨禅杖">
                <div class="gallery-item-info">
                    <h3>水磨禅杖</h3>
                    <p>鲁智深的兵器，重六十二斤</p>
                </div>
            </div>

            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="https://picsum.photos/600/400?random=54" alt="板斧">
                <div class="gallery-item-info">
                    <h3>板斧</h3>
                    <p>李逵的兵器，双斧开路</p>
                </div>
            </div>

            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="https://picsum.photos/600/400?random=55" alt="羽扇">
                <div class="gallery-item-info">
                    <h3>羽扇</h3>
                    <p>吴用的标志，运筹帷幄</p>
                </div>
            </div>
        </div>

        <div class="back-section">
            <a href="shuihu.html" class="back-btn">← 返回水浒传</a>
        </div>
    </div>

    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="close" onclick="closeLightbox()">&times;</span>
        <div class="lightbox-content" onclick="event.stopPropagation()">
            <img id="lightbox-img" src="" alt="">
            <div class="lightbox-caption" id="lightbox-caption"></div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2024 古典名著图片展示 | 基于 GitHub Pages 托管</p>
    </footer>

    <script>
        function openLightbox(element) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const lightboxCaption = document.getElementById('lightbox-caption');
            
            const img = element.querySelector('img');
            const title = element.querySelector('h3').textContent;
            
            lightboxImg.src = img.src;
            lightboxCaption.textContent = title;
            lightbox.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeLightbox();
            }
        });
    </script>
</body>
</html>
